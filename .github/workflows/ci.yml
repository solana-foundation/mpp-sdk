name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

defaults:
  run:
    working-directory: typescript

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --production

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v7
        with:
          name: html-assets
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test-ts:
    name: TypeScript tests
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v7
        with:
          name: html-assets
      - run: pnpm install --frozen-lockfile

      # Run ALL tests (unit + surfpool integration) with coverage
      - name: Run tests with coverage
        run: pnpm vitest run --coverage --config vitest.config.ci.ts
        env:
          SURFPOOL_REPORT: "1"

      - name: Upload TS coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ts-coverage
          path: typescript/coverage/coverage-summary.json

      - name: Upload TS surfpool report data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surfpool-reports-ts
          path: typescript/target/surfpool-reports/
          if-no-files-found: ignore

  build-html:
    name: Build HTML payment link assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          package-manager-cache: false
      - name: Install and build
        working-directory: html
        run: |
          npm install
          npm run build
      - name: Verify committed gen files are up to date
        working-directory: .
        run: |
          if ! git diff --quiet -- rust/src/server/html/ go/server/html/ lua/mpp/server/html_assets/ python/src/solana_mpp/server/html/; then
            echo "::error::Generated files are out of date. Run 'just html-build' and commit the results."
            git diff --stat -- rust/src/server/html/ go/server/html/ lua/mpp/server/html_assets/ python/src/solana_mpp/server/html/
            exit 1
          fi
      - name: Upload HTML build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: html-assets
          path: |
            html/dist/
            rust/src/server/html/
            go/server/html/
            lua/mpp/server/html_assets/
            python/src/solana_mpp/server/html/
            typescript/packages/mpp/src/server/html-assets.gen.ts

  test-rust:
    name: Rust tests
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - name: Download HTML assets
        uses: actions/download-artifact@v7
        with:
          name: html-assets

      - name: Run tests with coverage
        working-directory: rust
        env:
          SURFPOOL_REPORT: "1"
        run: cargo llvm-cov --json --output-path coverage.json

      - name: Rust format check
        working-directory: rust
        run: cargo fmt --check

      - name: Upload Rust coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rust-coverage
          path: rust/coverage.json

      - name: Upload Rust surfpool report data
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: surfpool-reports-rust
          path: rust/target/surfpool-reports/
          if-no-files-found: ignore

  test-go:
    name: Go tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: go/go.mod
          cache-dependency-path: go/go.sum
      - name: Run tests with coverage
        working-directory: go
        env:
          GOCACHE: /tmp/go-build-cache
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic
          ./scripts/check_coverage.sh coverage.out 70
      - name: Upload Go coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: go-coverage
          path: go/coverage.out

  integration:
    name: Integration tests
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v7
        with:
          name: html-assets
      - name: Install Surfnet helper dependencies
        working-directory: tests/interop
        run: pnpm install --frozen-lockfile
      - name: Start Surfnet
        working-directory: .
        run: |
          node tests/interop/start-surfnet-proxy.mjs &
          ready=0
          for i in $(seq 1 50); do
            if curl -sf -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              | grep -q '"result":"ok"'; then
              ready=1
              break
            fi
            sleep 0.2
          done
          test "$ready" -eq 1
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:integration

  test-payment-links-demo:
    name: "Payment links E2E: Demo (TypeScript)"
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v7
        with:
          name: html-assets
      - name: Install Surfnet helper dependencies
        working-directory: tests/interop
        run: pnpm install --frozen-lockfile
      - name: Start Surfnet
        working-directory: .
        run: |
          node tests/interop/start-surfnet-proxy.mjs &
          ready=0
          for i in $(seq 1 50); do
            if curl -sf -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              | grep -q '"result":"ok"'; then
              ready=1
              break
            fi
            sleep 0.2
          done
          test "$ready" -eq 1
      - name: Install TypeScript dependencies
        working-directory: typescript
        run: pnpm install --frozen-lockfile
      - name: Build TypeScript SDK
        working-directory: typescript
        run: pnpm build
      - name: Install demo server dependencies
        working-directory: demo/server
        run: pnpm install --frozen-lockfile
      - name: Install HTML dependencies & Playwright
        working-directory: html
        run: npm install && npx playwright install chromium
      - name: Start demo server
        working-directory: demo/server
        run: npx tsx index.ts &
        env:
          NETWORK: localnet
      - name: Wait for demo server
        working-directory: .
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/api/v1/health && break
            sleep 1
          done
      - name: Run Playwright tests (Demo)
        working-directory: html
        run: npm run test:e2e:demo

  test-payment-links-rust:
    name: "Payment links E2E: Rust"
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-rust-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-rust-
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v7
        with:
          name: html-assets
      - name: Install Surfnet helper dependencies
        working-directory: tests/interop
        run: pnpm install --frozen-lockfile
      - name: Start Surfnet
        working-directory: .
        run: |
          node tests/interop/start-surfnet-proxy.mjs &
          ready=0
          for i in $(seq 1 50); do
            if curl -sf -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              | grep -q '"result":"ok"'; then
              ready=1
              break
            fi
            sleep 0.2
          done
          test "$ready" -eq 1
      - name: Install HTML dependencies & Playwright
        working-directory: html
        run: npm install && npx playwright install chromium
      - name: Build Rust test server
        working-directory: rust
        run: cargo build --example payment_link_server
      - name: Start Rust test server
        working-directory: rust
        run: cargo run --example payment_link_server &
      - name: Wait for Rust server
        working-directory: .
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3001/health && break
            sleep 1
          done
      - name: Run Playwright tests (Rust)
        working-directory: html
        run: npm run test:e2e:rust

  interop:
    name: "Interop: TypeScript harness"
    needs: build-html
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-interop-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-interop-
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - name: Download HTML assets
        uses: actions/download-artifact@v7
        with:
          name: html-assets
      - name: Install TypeScript workspace
        working-directory: typescript
        run: pnpm install --frozen-lockfile
      - name: Build TypeScript package
        working-directory: typescript
        run: pnpm --filter @solana/mpp build
      - name: Build Rust interop adapters
        working-directory: rust
        run: cargo build --bin interop_client --bin interop_server
      - name: Install interop harness
        working-directory: tests/interop
        run: pnpm install --frozen-lockfile
      - name: Typecheck interop harness
        working-directory: tests/interop
        run: pnpm typecheck
      - name: Run Rust client interop smoke
        working-directory: tests/interop
        run: pnpm exec vitest run test/e2e.test.ts --testNamePattern "rust client pays typescript server"
        env:
          MPP_INTEROP_CLIENTS: rust
          MPP_INTEROP_SERVERS: typescript
      - name: Run Rust server interop smoke
        working-directory: tests/interop
        run: pnpm exec vitest run test/e2e.test.ts --testNamePattern "typescript client pays rust server"
        env:
          MPP_INTEROP_CLIENTS: typescript
          MPP_INTEROP_SERVERS: rust
      - name: Run Rust end-to-end interop smoke
        working-directory: tests/interop
        run: pnpm exec vitest run test/e2e.test.ts --testNamePattern "rust client pays rust server"
        env:
          MPP_INTEROP_CLIENTS: rust
          MPP_INTEROP_SERVERS: rust
