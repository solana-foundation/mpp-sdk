name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:

defaults:
  run:
    working-directory: typescript

jobs:
  audit:
    name: Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm audit --production

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm test

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    services:
      surfpool:
        image: surfpool/surfpool:latest
        ports:
          - 8899:8899
          - 8900:8900
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          package_json_file: package.json
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Wait for Surfpool
        working-directory: .
        run: |
          for i in $(seq 1 30); do
            curl -s -X POST http://localhost:8899 \
              -H "Content-Type: application/json" \
              -d '{"jsonrpc":"2.0","id":1,"method":"getHealth","params":[]}' \
              && break
            sleep 1
          done
      - run: pnpm test:integration
